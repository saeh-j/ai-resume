/* ============================== résumé chat ============================== */
function localEdit(resume, instr){
  const s=instr.toLowerCase(); const r=clone(resume);
  if(/concise|shorten|shorter|tighten|trim|brief/.test(s)){
    if(r.summary){ const parts=r.summary.split(/(?<=[.!?])\s+/); r.summary=parts.slice(0,2).join(' '); }
    (r.experience||[]).forEach(e=>{ if(e.bullets) e.bullets=e.bullets.slice(0,3); });
    return { resume:r, note:'Tightened the summary and trimmed each role to its three strongest bullets.' };
  }
  if(/first[\s-]?person|remove i|no i\b|third person/.test(s)){
    const fix=(t)=>t?t.replace(/\bI\s+/g,'').replace(/\bmy\s+/gi,'').replace(/^\s*([a-z])/,(m,c)=>c.toUpperCase()):t;
    if(r.summary) r.summary=fix(r.summary);
    (r.experience||[]).forEach(e=>{ if(e.bullets) e.bullets=e.bullets.map(fix); });
    return { resume:r, note:'Stripped first-person phrasing throughout.' };
  }
  return null;
}
function ResumeChat({ resume, target, setResume }){
  const { setAiOn } = useApp();
  const [msgs,setMsgs]=useState([{ role:'assistant', text:"I can rewrite your résumé live — ask for anything, like \u201Cemphasize leadership\u201D or \u201Ctighten the summary.\u201D You can also click any text to edit it by hand." }]);
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const scrollRef=useRef(null);
  useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight; },[msgs,busy]);
  const quick=['Make the summary more concise','Emphasize leadership & impact','Add more measurable results','Stronger action verbs','Make it more ATS-friendly'];
  const send=async(text)=>{
    const t=(text||input).trim(); if(!t||busy) return;
    setInput(''); setMsgs(m=>[...m,{role:'user',text:t}]); setBusy(true);
    try{
      const sys=`You edit a résumé represented as JSON. Apply the user's requested change and return the FULL updated résumé as JSON only (same schema), nothing else. Make only what's asked; keep all other content intact. Never invent facts the user hasn't provided. The target role is "${target.title||'unspecified'}".`;
      const out=await callAI({ system:sys, user:`Current résumé JSON:\n${JSON.stringify(resume)}\n\nRequested change: ${t}` });
      const j=parseJSON(out);
      if(j && j.name){ setResume(j); setMsgs(m=>[...m,{role:'assistant',text:'Done — updated on the left. Want anything else?'}]); setAiOn(true); }
      else throw new Error('parse');
    }catch(e){
      const le=localEdit(resume,t);
      if(le){ setResume(le.resume); setMsgs(m=>[...m,{role:'assistant',text:le.note+' (quick mode — the AI connection wasn\u2019t reachable.)'}]); }
      else setMsgs(m=>[...m,{role:'assistant',text:"The live AI editor isn\u2019t reachable right now, but you can edit any text on the résumé directly — just click it. I can still make it more concise or remove first-person offline if you ask."}]);
      setAiOn(false);
    }
    setBusy(false);
  };
  return (
    <div className="chat">
      <div className="chat-hd"><Icon name="sparkles" size={15} style={{stroke:'var(--accent)'}}/><Eyebrow>Tailor by chat</Eyebrow></div>
      <div className="chat-scroll" ref={scrollRef}>
        {msgs.map((m,i)=><div key={i} className={`msg ${m.role==='user'?'msg-user':'msg-assistant'}`}>{m.text}</div>)}
        {busy && <div className="msg msg-assistant"><Spinner size={13}/> editing…</div>}
      </div>
      <div className="quick-actions">{quick.map(q=><button key={q} className="qa" onClick={()=>send(q)} disabled={busy}>{q}</button>)}</div>
      <div className="chat-input">
        <input className="field" value={input} onChange={e=>setInput(e.target.value)} placeholder="Ask for an edit…" onKeyDown={e=>{ if(e.key==='Enter') send(); }} disabled={busy}/>
        <Btn size="sm" onClick={()=>send()} disabled={busy||!input.trim()}><Icon name="send" size={14}/></Btn>
      </div>
    </div>
  );
}

/* ============================== cover letter ============================== */
function CoverLetter({ target }){
  const { profile, entries, notify, setAiOn } = useApp();
  const [text,setText]=useState('');
  const [busy,setBusy]=useState(false);
  const gen=async()=>{
    setBusy(true);
    try{
      const sys=`Write a concise, specific cover letter in 3 short paragraphs for the target role, using only facts from the provided records and profile. Warm and confident, no clichés, no fabrication. Return plain text only, starting with the greeting.`;
      const u=`Applicant: ${profile.name}, ${profile.headline}\nTarget: ${target.title||'the role'}${target.company?' at '+target.company:''}\nKey/unique requirements: ${target.mandatory||'(none)'}\nRecords:\n${entries.map(e=>`- ${e.title}: ${e.summary}`).join('\n')}`;
      const out=await callAI({ system:sys, user:u });
      setText(out.trim()); setAiOn(true); notify('Cover letter drafted');
    }catch(e){ setText(buildLocalCover(profile,entries,target)); setAiOn(false); notify('Cover letter drafted (quick mode)'); }
    setBusy(false);
  };
  return (
    <div className="cover-wrap">
      <div className="paper-tools">
        <Eyebrow><Icon name="file" size={12}/> Cover letter {target.company?`· ${target.company}`:''}</Eyebrow>
        <div className="tool-right">
          <Btn variant="ghost" size="sm" onClick={()=>{ if(navigator.clipboard){navigator.clipboard.writeText(text); notify('Copied');} }} disabled={!text}><Icon name="copy" size={14}/>Copy</Btn>
          <Btn size="sm" onClick={gen} disabled={busy}>{busy?<Spinner/>:<Icon name="wand" size={14}/>}{text?'Regenerate':'Generate'}</Btn>
        </div>
      </div>
      <div className="cover-paper">
        {text ? <textarea className="cover-text" value={text} onChange={e=>setText(e.target.value)} /> :
          <div className="empty"><div className="empty-mark"><Icon name="file" size={18}/></div><p>Generate a tailored letter from your records and the role you set — then edit it freely here.</p></div>}
      </div>
    </div>
  );
}

/* ============================== résumé studio ============================== */
function ResumeStudio(){
  const { profile, entries, resumes, setResumes, notify, setAiOn } = useApp();
  const [tab,setTab]=useState('setup');
  const [target,setTarget]=useState({ title:'', company:'', jobText:'', mandatory:'', tone:'Impactful' });
  const [template,setTemplate]=useState('Modern');
  const [styleHints,setStyleHints]=useState(null);
  const [model,setModel]=useState(null);
  const [resume,setResume]=useState(null);
  const [busy,setBusy]=useState(false);
  const fileRef=useRef(null);
  const setT=(k,v)=>setTarget(p=>({...p,[k]:v}));

  const onFile=(e)=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; const reader=new FileReader(); reader.onload=()=>{ setModel({ b64:String(reader.result).split(',')[1], mime:f.type||'application/octet-stream', name:f.name, kind:(f.type||'').includes('pdf')?'document':'image' }); setTemplate('Imported'); setStyleHints(null); }; reader.readAsDataURL(f); };

  const generate=async()=>{
    setBusy(true);
    try{
      const imported = template==='Imported' && model;
      const sys=`You are an expert résumé writer and ATS specialist. Produce a comprehensive, detailed résumé as JSON only — no markdown, no commentary. Target length: 3 to 5 full pages of content. Schema: {"name","headline","contact":{"email","phone","location","links":[]},"summary","experience":[{"role","organization","location","start","end","bullets":[]}],"projects":[{"name","description","bullets":[]}],"education":[{"credential","institution","year","details":""}],"certifications":[],"volunteer":[{"role","organization","bullets":[]}],"skills":[],"awards":[{"title","description":""}]}. Rules: Use ONLY facts from the provided profile and records — never invent employers, titles, dates, or numbers. Write 5–8 detailed bullets per role — use natural professional language (present tense for current roles, past tense for past roles). Do NOT force every bullet to start with an action verb; write the way a professional actually describes their work, e.g. "Responsible for managing the team's sprint planning" or "Works closely with designers to ship features on time." Write a 4–6 sentence first-person summary. Include all volunteer work, certifications, and awards. Order experience by relevance to the target; mirror job-description language naturally where truthful. Tone: ${target.tone}.${imported?` A model résumé is attached — mirror its section order, structure and visual feel, and ALSO include a top-level "styleHints":{"accent":"#hex","font":"serif|sans|mono","columns":1|2,"headerStyle":"serif|bar|hair|mono|plain"} describing its look.`:''}`;
      const u=`PROFILE: ${JSON.stringify(profile)}\n\nTARGET ROLE: ${target.title||'(unspecified)'}${target.company?' at '+target.company:''}\nJOB DESCRIPTION: ${target.jobText||'(none provided)'}\nMUST-HAVE / UNIQUE REQUIREMENTS:\n${target.mandatory||'(none)'}\n\nRECORDS:\n${entries.map(e=>`- [${e.category}] ${e.title}${e.organization?' @ '+e.organization:''} | role: ${e.role||'-'} | skills: ${(e.skills||[]).join(', ')} | impact: ${(e.metrics||[]).join('; ')} | ${e.summary}`).join('\n')}`;
      const out=await callAI({ system:sys, user:u, attachments: imported?[{kind:model.kind,mime:model.mime,b64:model.b64}]:null });
      const j=parseJSON(out);
      if(j && j.name){ if(j.styleHints){ setStyleHints(j.styleHints); setTemplate('Imported'); } setResume(j); setAiOn(true); notify('Résumé generated'); setTab('edit'); }
      else throw new Error('parse');
    }catch(e){
      setResume(buildLocalResume(profile, entries, target)); setAiOn(false); notify('Résumé built (quick mode)'); setTab('edit');
    }
    setBusy(false);
  };
  const saveVersion=()=>{ if(!resume) return; const v={ id:uid(), name: target.title? `${target.title}${target.company?' · '+target.company:''}` : `${template} résumé`, resume, template, styleHints, target, createdAt:Date.now() }; setResumes(rs=>[v,...rs]); notify('Version saved'); };
  const loadVersion=(v)=>{ setResume(v.resume); setTemplate(v.template); setStyleHints(v.styleHints); setTarget(v.target); setTab('edit'); };
  const match=useMemo(()=>resume?computeMatch(resume,`${target.title} ${target.jobText} ${target.mandatory}`):null,[resume,target]);

  return (
    <div className="page-body studio">
      <header className="dash-hd">
        <Eyebrow><Icon name="wand" size={12}/> Résumé Studio</Eyebrow>
        <h1 className="font-display h-xl">Build it from the record.</h1>
        <p className="lede">Say what you're applying for. Tally pulls the relevant wins, tailors them, and you fine-tune — by hand or by chat.</p>
      </header>

      <div className="studio-tabs">
        {[['setup','Target','target'],['template','Template','layers'],['edit','Edit & tailor','pencil'],['cover','Cover letter','file']].map(([id,label,icon])=>{
          const locked=(id==='edit'||id==='cover') && !resume;
          return <button key={id} className={`stab ${tab===id?'stab-on':''} ${locked?'stab-lock':''}`} disabled={locked} onClick={()=>!locked&&setTab(id)}><Icon name={icon} size={14}/>{label}</button>;
        })}
      </div>

      {tab==='setup' && (
        <div className="setup">
          <section className="card pad">
            <div className="grid-2">
              <label className="lbl">Target role / title<input className="field" value={target.title} onChange={e=>setT('title',e.target.value)} placeholder="e.g. Associate Product Manager"/></label>
              <label className="lbl">Company <span className="dim">(optional)</span><input className="field" value={target.company} onChange={e=>setT('company',e.target.value)} placeholder="e.g. Figma"/></label>
            </div>
            <label className="lbl">Paste the job description <span className="dim">— Tally tailors wording & ranks your wins against it</span>
              <textarea className="field" rows={5} value={target.jobText} onChange={e=>setT('jobText',e.target.value)} placeholder="Paste the posting here…"/></label>
            <label className="lbl">Must-have or unique requirements <span className="dim">— one per line</span>
              <textarea className="field" rows={3} value={target.mandatory} onChange={e=>setT('mandatory',e.target.value)} placeholder={"Include a portfolio link\nRequires SQL proficiency\nAvailable to start in June"}/></label>
            <label className="lbl">Tone</label>
            <div className="tone-row">{['Impactful','Concise','Professional','Friendly'].map(t=><button key={t} className={`hint ${target.tone===t?'hint-on':''}`} onClick={()=>setT('tone',t)}>{t}</button>)}</div>
            <div className="setup-foot">
              <span className="dim sm">{entries.length} records ready · {entries.filter(e=>e.visibility==='public').length} public</span>
              <Btn onClick={()=>setTab('template')}>Choose a template <Icon name="chevright" size={15}/></Btn>
            </div>
          </section>
          {resumes.length>0 && (
            <section className="card pad saved-card">
              <Eyebrow><Icon name="file" size={12}/> Saved versions</Eyebrow>
              <div className="saved-list">{resumes.map(v=>(
                <button key={v.id} className="saved-item" onClick={()=>loadVersion(v)}>
                  <span className="mini-ic cat-Project"><Icon name="file" size={13}/></span>
                  <span className="saved-name">{v.name}</span><span className="dim mono sm">{v.template}</span><Icon name="chevright" size={15}/>
                </button>
              ))}</div>
            </section>
          )}
        </div>
      )}

      {tab==='template' && (
        <div>
          <div className="tpl-gallery">
            {Object.keys(TEMPLATE_CFG).map(name=>(
              <button key={name} className={`tpl-card ${template===name?'tpl-on':''}`} onClick={()=>{ setTemplate(name); setStyleHints(null); }}>
                <div className="tpl-preview"><TemplateThumb name={name} cfg={TEMPLATE_CFG[name]}/></div>
                <div className="tpl-meta"><span className="tpl-name">{name}</span>{template===name && <Icon name="check" size={16} className="tpl-check"/>}</div>
                <span className="tpl-blurb">{TEMPLATE_CFG[name].blurb}</span>
              </button>
            ))}
            <button className={`tpl-card ${template==='Imported'?'tpl-on':''}`} onClick={()=>fileRef.current&&fileRef.current.click()}>
              <div className="tpl-preview tpl-drop"><Icon name="upload" size={22}/>{model?model.name:'Upload a model résumé'}</div>
              <div className="tpl-meta"><span className="tpl-name">Imported</span>{template==='Imported' && <Icon name="check" size={16} className="tpl-check"/>}</div>
              <span className="tpl-blurb">{model?'Tally mirrors its layout & style.':'PDF or image — AI matches its look with your data.'}</span>
            </button>
            <input ref={fileRef} type="file" accept="image/*,application/pdf" style={{display:'none'}} onChange={onFile}/>
          </div>
          <div className="tpl-foot">
            <div><div className="tpl-foot-label mono">SELECTED</div><div className="tpl-foot-name font-display">{template}{template==='Imported'&&model?` · ${model.name}`:''}</div></div>
            <Btn onClick={generate} disabled={busy}>{busy?<Spinner/>:<Icon name="sparkles" size={15}/>}{busy?'Generating…':(resume?'Regenerate':'Generate résumé')}</Btn>
          </div>
        </div>
      )}

      {tab==='edit' && resume && (
        <div className="edit-wrap">
          <div className="paper-col">
            <div className="paper-tools">
              <div className="tool-left">
                <Eyebrow><Icon name="file" size={12}/> Live résumé</Eyebrow>
                <select className="field tpl-select" value={template} onChange={e=>{ setTemplate(e.target.value); if(e.target.value!=='Imported') setStyleHints(null); }}>
                  {Object.keys(TEMPLATE_CFG).map(n=><option key={n} value={n}>{n}</option>)}
                  {styleHints && <option value="Imported">Imported</option>}
                </select>
              </div>
              <div className="tool-right">
                <Btn variant="ghost" size="sm" onClick={()=>{ if(navigator.clipboard){navigator.clipboard.writeText(resumeToText(resume)); notify('Copied as text');} }}><Icon name="copy" size={14}/>Copy</Btn>
                <Btn variant="ghost" size="sm" onClick={()=>downloadResume(resume)}><Icon name="download" size={14}/>Download</Btn>
                <Btn variant="ghost" size="sm" onClick={()=>window.print()}><Icon name="file" size={14}/>PDF</Btn>
                <Btn size="sm" onClick={saveVersion}><Icon name="check" size={14}/>Save</Btn>
              </div>
            </div>
            <div className="paper-scroll"><ResumePaper resume={resume} template={template} styleHints={styleHints} onChange={setResume}/></div>
          </div>
          <div className="side-col">
            {match && (
              <section className="card pad match-card">
                <Eyebrow><Icon name="target" size={12}/> Job match</Eyebrow>
                <div className="match-top" style={{marginTop:'.7rem'}}>
                  <MatchRing pct={match.pct}/>
                  <p className="match-note">{match.pct>=75?'Strong alignment with the posting.':(match.pct>=50?'Decent match — weave in a few missing terms.':'Add detail or skills to lift this.')}</p>
                </div>
                {match.missing.length>0 && <div className="missing"><span className="missing-l mono">MISSING KEYWORDS</span><div className="chip-row" style={{marginTop:0}}>{match.missing.map(m=><span key={m} className="chip-mini chip-warn">{m}</span>)}</div></div>}
              </section>
            )}
            <section className="card pad"><ResumeChat resume={resume} target={target} setResume={setResume}/></section>
          </div>
        </div>
      )}

      {tab==='cover' && resume && <CoverLetter target={target} />}
    </div>
  );
}

        <span className="settings-section-label">Privacy & posting</span>

          <div><div className="setting-label">Auto-post logs publicly</div><div className="setting-desc">New journal entries are automatically shared to your community feed</div></div>

          <div><div className="setting-label">Default entry visibility</div><div className="setting-desc">Starting visibility when you log a new entry</div></div>

        <div className="setting-row">
          <div><div className="setting-label">Default résumé tone</div><div className="setting-desc">Applied automatically when generating new résumés</div></div>

function AuthScreen(){
  const [mode,setMode] = useState('login');
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [busy,setBusy] = useState(false);
  const [error,setError] = useState('');
  const [success,setSuccess] = useState('');

  const submit = async (ev) => {
    ev.preventDefault();
    setBusy(true); setError(''); setSuccess('');
    try{
      if(mode==='login'){
        const {error:e} = await window._sb.auth.signInWithPassword({email,password});
        if(e) throw e;
      } else {
        const {error:e} = await window._sb.auth.signUp({email,password});
        if(e) throw e;
        setSuccess('Check your email for a confirmation link to activate your account.');
      }
    }catch(e){ setError(e.message||'Something went wrong'); }
    finally{ setBusy(false); }
  };

  return (
    <div className="auth-page">
      <div className="auth-card card">
        <div className="auth-brand">
          <span className="brand-mark"><TallyMark/></span>
          <span className="brand-name">Tally</span>
        </div>
        <h2 className="auth-h">{mode==='login'?'Sign in to your account':'Create your account'}</h2>
        <form onSubmit={submit}>
          <label className="lbl">Email
            <input className="field" type="email" autoComplete="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"/>
          </label>
          <label className="lbl" style={{marginTop:'.7rem'}}>Password
            <input className="field" type="password" autoComplete={mode==='login'?'current-password':'new-password'} required value={password} onChange={e=>setPassword(e.target.value)} placeholder={mode==='login'?'Your password':'At least 6 characters'} minLength={6}/>
          </label>
          {error && <p className="auth-error">{error}</p>}
          {success && <p className="auth-success">{success}</p>}
          <Btn style={{width:'100%',marginTop:'1.1rem',justifyContent:'center'}} disabled={busy}>
            {busy?<Spinner/>:(mode==='login'?<Icon name="lock" size={15}/>:<Icon name="plus" size={15}/>)}
            {busy?'Please wait…':(mode==='login'?'Sign in':'Create account')}
          </Btn>
        </form>
        <p className="auth-switch">
          {mode==='login'?'No account yet?':'Already have an account?'}
          <button className="link-btn" style={{marginLeft:'.4rem'}} onClick={()=>{setMode(mode==='login'?'signup':'login');setError('');setSuccess('');}}>
            {mode==='login'?'Sign up free':'Sign in'}
          </button>
        </p>
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  render(){
    if(this.state.err) return (
      <div style={{padding:'2rem',fontFamily:'monospace',fontSize:'.85rem',color:'#b91c1c',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:'12px',margin:'2rem',lineHeight:1.6}}>
        <strong>Something went wrong.</strong><br/>{String(this.state.err)}
      </div>
    );
    return this.props.children;
  }
}

function Root(){
  const [session,setSession] = useState(undefined);
  useEffect(()=>{
    window._sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const {data:{subscription}} = window._sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);
  if(session===undefined) return <div className="boot"><Spinner size={26}/><div>Loading…</div></div>;
  if(!session) return <AuthScreen/>;
  return <App session={session}/>;
}

/* ============================== app ============================== */
function App({ session }){
  const [profile,setProfile]=useState(SEED.profile);
  const [entries,setEntries]=useState([]);
  const [resumes,setResumes]=useState([]);
  const [community,setCommunity]=useState(SEED.community);
  const [settings,setSettings]=useState(SEED.settings);
  const [view,setView]=useState('home');
  const [toasts,setToasts]=useState([]);
  const [aiOn,setAiOn]=useState(null);
  const [hydrated,setHydrated]=useState(false);
  const [quickLog,setQuickLog]=useState(false);
  const [settingsOpen,setSettingsOpen]=useState(false);

  useEffect(()=>{ (async()=>{
    const p=await store.get(K.profile,null);
    if(p){
      setProfile(p);
      setEntries(await store.get(K.entries,[]));
      setResumes(await store.get(K.resumes,[]));
      const rawC = await store.get(K.community,SEED.community);
      // migrate: strip old hardcoded peers array
      setCommunity({likes:[],comments:{},posts:[],connections:[],...rawC, peers:undefined});
      setSettings(await store.get(K.settings,SEED.settings));
    } else {
      setProfile(SEED.profile); setEntries(SEED.entries); setCommunity(SEED.community); setSettings(SEED.settings);
      await store.set(K.profile,SEED.profile); await store.set(K.entries,SEED.entries);
      await store.set(K.community,SEED.community); await store.set(K.settings,SEED.settings);
    }
    setHydrated(true);
  })(); },[]);

  useEffect(()=>{ if(hydrated) store.set(K.profile,profile); },[profile,hydrated]);
  useEffect(()=>{ if(hydrated) store.set(K.entries,entries); },[entries,hydrated]);
  useEffect(()=>{ if(hydrated) store.set(K.resumes,resumes); },[resumes,hydrated]);
  useEffect(()=>{ if(hydrated) store.set(K.community,community); },[community,hydrated]);
  useEffect(()=>{ if(hydrated) store.set(K.settings,settings); },[settings,hydrated]);
  useEffect(()=>{ document.body.classList.toggle('dark', !!settings.darkMode); },[settings.darkMode]);

  const notify=(msg)=>{ const id=uid(); setToasts(t=>[...t,{id,msg}]); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2600); };
  const logEntry=async(raw,hint)=>{
    const s=await structureEntry(raw,hint,setAiOn);
    const vis=settings.defaultVisibility||'private';
    const entry={ id:uid(), createdAt:Date.now(), visibility:vis, ...s };
    setEntries(e=>[entry,...e]);
    if(settings.autoPostPublic){
      const post={ id:uid(), name:profile.name||'You', headline:profile.headline||'', avatar:profile.avatar||'·', accountType:profile.accountType||'', content:`${entry.title}\n${entry.summary}`, visibility:'public', category:entry.category, media:null, likes:[], createdAt:Date.now(), mine:true };
      setCommunity(c=>({...c, posts:[post,...(c.posts||[])]}));
    }
    return entry;
  };
  const addEntries=(arr)=>setEntries(e=>[...arr,...e]);
  const updateEntry=(id,patch)=>setEntries(e=>e.map(x=>x.id===id?{...x,...patch}:x));
  const deleteEntry=(id)=>setEntries(e=>e.filter(x=>x.id!==id));

  const ctx={ profile,setProfile, entries,setEntries, addEntries, logEntry, updateEntry, deleteEntry, resumes,setResumes, community,setCommunity, settings,setSettings, view,setView, notify, aiOn,setAiOn, quickLog,setQuickLog, settingsOpen,setSettingsOpen };

  if(!hydrated) return <div className="boot"><Spinner size={26}/><div>Opening your record…</div></div>;

  return (
    <Ctx.Provider value={ctx}>
      <div className="app-shell">
        <Sidebar/>
        <main className="main">
          <MobileTop/>
          {view==='home' && <Dashboard/>}
          {view==='journal' && <JournalView/>}
          {view==='profile' && <ProfileView/>}
          {view==='community' && <CommunityView/>}
          {view==='resume' && <ResumeStudio/>}
        </main>
        <BottomNav/>
      </div>
      {quickLog && <QuickLogModal onClose={()=>setQuickLog(false)} />}
      {settingsOpen && <SettingsModal onClose={()=>setSettingsOpen(false)} />}
      <div className="toasts">{toasts.map(t=><div key={t.id} className="toast"><Icon name="check" size={15}/>{t.msg}</div>)}</div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><Root/></ErrorBoundary>
);
</script>
</body>
</html>
